name: CI

# Runs the unit test suite on every push and pull request to main. The suite
# mocks the model backends (no weight downloads), so it is fast and hermetic;
# see README "Tests". This mirrors the documented dev setup:
#   pip install -r requirements-dev.txt  &&  python -m pytest
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"   # matches the dev host (see data/phase2/manifest_cpu.json)
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies (CPU-only runtime + test tooling)
        # requirements.txt pins the CPU torch index, so no CUDA wheels are pulled.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run test suite
        run: python -m pytest -v

      - name: Check documented test count is in sync
        # Fails if docs/STATUS.md or README.md name a stale count; run
        # `python tools/update_test_count.py` locally to resync.
        run: python tools/update_test_count.py --check
